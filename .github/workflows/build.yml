name: Build
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version field to bump"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.new }}
    defaults:
      run:
        shell: bash
        working-directory: .
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: x64
          - os: windows-latest
            arch: x86
          - os: ubuntu-latest
            arch: x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Python (${{ matrix.arch }})
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true
          architecture: ${{ matrix.arch }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: ./.venv
          key: venv-${{ matrix.os }}-${{ matrix.arch }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --with build

      - name: Bump version
        id: version
        run: |
          poetry version ${{ github.event.inputs.bump }}
          echo "new=$(poetry version -s)" >> $GITHUB_OUTPUT

      - name: Commit version bump
        if: matrix.os == 'windows-latest' && matrix.arch == 'x64'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add pyproject.toml
          git commit -m "chore: bump version to ${{ steps.version.outputs.new }}"
          git push

      - name: Set binary name (Windows)
        if: runner.os == 'Windows'
        run: echo "BINARY_NAME=media-rpc-${{ steps.version.outputs.new }}-windows-${{ matrix.arch }}" >> $GITHUB_ENV

      - name: Set binary name (Linux)
        if: runner.os == 'Linux'
        run: echo "BINARY_NAME=media-rpc-${{ steps.version.outputs.new }}-linux-${{ matrix.arch }}" >> $GITHUB_ENV

      - name: Build
        run: >
          poetry run pyinstaller
          --onefile
          --collect-data babelfish
          --collect-data guessit
          --collect-submodules babelfish
          --collect-submodules guessit
          --name ${{ env.BINARY_NAME }}
          src/media_rpc/cli.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}
          path: |
            dist/*.exe
            dist/${{ env.BINARY_NAME }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Get changelog
        id: changelog
        run: |
          LOG=$(git log --oneline -15 --no-decorate)
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: v${{ needs.build.outputs.version }}
          body: |
            ## Changelog
            ${{ steps.changelog.outputs.log }}
          files: |
            dist/*.exe
            dist/media-rpc-*-linux-*